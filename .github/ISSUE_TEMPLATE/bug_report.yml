name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. Pixel 7
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: Android Version
      placeholder: e.g. Android 14
    validations:
      required: true
